<html>
<head><title>JS</title></head>

<body>
	<div>
	<img id="img" src="image/off.gif">
	</div>
	
	<button onclick="setOn()"> on </button>
	<button onclick="setOff()"> off </button>	

<script>
	function setOn(){
		document.getElementById('img').src="image/on.gif";
	}
	
	function setOff(){
		document.getElementById('img').src="image/off.gif";
	}	
	
</script>
</body>
</html>
